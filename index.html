<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <!-- ===== 手机桌面图标 ===== -->
    <link rel="icon" href="/icon.png" type="image/png">
    <link rel="apple-touch-icon" href="/touch-icon.png">
    <meta name="msapplication-TileImage" content="/touch-icon.png">
    <meta name="msapplication-TileColor" content="#fdf8ed">

    <!-- ===== 自动隐藏地址栏 ===== -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- ===== 视口设置 ===== -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

    <!-- ===== 主题色 ===== -->
    <meta name="theme-color" content="#fdf8ed">

    <title>阅读器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            overflow: hidden;
        }
        body {
            font-family: 'Georgia', 'Times New Roman', '宋体', 'Noto Serif SC', serif;
            background: #fdf8ed;
            color: #3d2b1a;
            display: flex;
            flex-direction: column;
            overscroll-behavior: none;
        }

        /* ===== 顶部栏 ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            flex-shrink: 0;
            background: #fdf8ed;
            border-bottom: 1px solid #ece0cf;
            gap: 8px;
            flex-wrap: wrap;
            padding-top: env(safe-area-inset-top, 8px);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 1;
            min-width: 0;
            flex-wrap: wrap;
        }
        .header-left .logo {
            width: 34px;
            height: 34px;
            background: #d4a37315;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        .header-left .title {
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 1px;
            color: #3d2b1a;
            flex-shrink: 0;
        }
        .header-left .book-wrap {
            position: relative;
            flex-shrink: 0;
        }
        .header-left .book-btn {
            background: #d4a37315;
            border: 1px solid #e0d0bc;
            border-radius: 30px;
            padding: 5px 14px;
            font-size: 12px;
            cursor: pointer;
            color: #3d2b1a;
            transition: all 0.2s;
            font-weight: 500;
            white-space: nowrap;
        }
        .header-left .book-btn:hover {
            opacity: 0.8;
            transform: scale(0.96);
        }
        .header-left .current-title {
            font-size: 12px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 160px;
            font-weight: 400;
            color: #9e8262;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .header-right button {
            border-radius: 30px;
            padding: 5px 12px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            border: none;
            white-space: nowrap;
        }
        .header-right button:hover {
            opacity: 0.8;
            transform: scale(0.96);
        }
        .header-right .btn-import {
            background: #d4a373;
            color: #fff;
        }
        .header-right .btn-backup {
            background: transparent;
            color: #3d2b1a;
            border: 1px solid #e0d0bc;
        }
        .header-right .btn-restore {
            background: transparent;
            color: #3d2b1a;
            border: 1px solid #e0d0bc;
        }
        .header-right .btn-del {
            background: transparent;
            color: #e8a0a0;
            border: 1px solid #e8a0a0;
        }
        .header-right .btn-close {
            background: none;
            border: none;
            color: #3d2b1a;
            font-size: 18px;
            padding: 4px 8px;
            border-radius: 30px;
            opacity: 0.6;
        }

        /* ===== 书库下拉菜单 ===== */
        .book-menu {
            display: none;
            position: absolute;
            top: 38px;
            left: 0;
            background: #ffffff;
            border: 1px solid #ece0cf;
            border-radius: 16px;
            z-index: 1001;
            min-width: 200px;
            max-width: 260px;
            max-height: 340px;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.12);
        }
        .book-menu.show {
            display: block;
        }
        .book-menu .item {
            padding: 10px 14px;
            cursor: pointer;
            border-bottom: 1px solid #ece0cf;
            transition: all 0.15s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .book-menu .item:hover {
            background: #d4a37320;
        }
        .book-menu .item .name {
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 13px;
            color: #3d2b1a;
            max-width: 160px;
        }
        .book-menu .item .count {
            font-size: 10px;
            color: #d4a373;
            margin-left: 12px;
        }
        .book-menu .empty {
            padding: 16px;
            text-align: center;
            color: #9e8262;
            font-size: 12px;
        }

        /* ===== 工具栏 ===== */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 6px 16px;
            border-bottom: 1px solid #ece0cf;
            flex-shrink: 0;
            flex-wrap: wrap;
            background: #fdf8ed;
        }
        .toolbar .font-group {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #d4a37308;
            border-radius: 30px;
            padding: 2px 8px;
        }
        .toolbar .font-group button {
            background: transparent;
            border: none;
            width: 28px;
            height: 28px;
            font-size: 14px;
            cursor: pointer;
            color: #3d2b1a;
            border-radius: 50%;
            transition: all 0.2s;
        }
        .toolbar .font-group button:hover {
            background: #d4a37320;
        }
        .toolbar .font-group span {
            font-size: 12px;
            min-width: 32px;
            text-align: center;
            font-weight: 500;
            color: #3d2b1a;
        }
        .toolbar select {
            background: #ffffff;
            border: 1px solid #e0d0bc;
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 11px;
            color: #3d2b1a;
            cursor: pointer;
            outline: none;
        }
        .toolbar select:focus {
            border-color: #d4a373;
            box-shadow: 0 0 0 2px #d4a37320;
        }
        .toolbar .goto-group {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #d4a37308;
            border-radius: 30px;
            padding: 2px 10px;
        }
        .toolbar .goto-group span {
            font-size: 11px;
            color: #9e8262;
        }
        .toolbar .goto-group input {
            width: 55px;
            padding: 4px 0;
            border: none;
            background: transparent;
            color: #3d2b1a;
            font-size: 12px;
            outline: none;
            text-align: center;
        }
        .toolbar .goto-group input:focus {
            border-color: #d4a373;
        }
        .toolbar .goto-group button {
            background: #d4a373;
            color: #fff;
            border: none;
            border-radius: 24px;
            padding: 4px 12px;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .toolbar .goto-group button:hover {
            opacity: 0.8;
            transform: scale(0.96);
        }

        /* ===== 阅读区 ===== */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            font-family: 'Georgia', 'Times New Roman', '宋体', 'Noto Serif SC', serif;
            font-size: 18px;
            line-height: 1.85;
            background: #fdf8ed;
            color: #3d2b1a;
            -webkit-overflow-scrolling: touch;
        }
        .content .placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 50vh;
            text-align: center;
        }
        .content .placeholder .icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.35;
        }
        .content .placeholder .name {
            font-size: 14px;
            color: #d4a373;
            margin-bottom: 8px;
        }
        .content .placeholder .sub {
            font-size: 12px;
            opacity: 0.5;
        }
        .content .chapter-wrap {
            max-width: 720px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
        }
        .content .chapter-wrap .chapter-title {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .content .chapter-wrap .chapter-title h1 {
            font-size: 1.4rem;
            font-weight: 400;
            margin: 0;
            color: #d4a373;
            letter-spacing: 3px;
            display: inline-block;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid #d4a373;
        }
        .content .chapter-wrap p {
            margin-bottom: 1.2rem;
            text-indent: 2em;
            line-height: 1.85;
        }
        .content .chapter-wrap .footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 1.5rem;
            font-size: 0.75rem;
            opacity: 0.45;
            border-top: 1px solid #ece0cf;
        }

        /* ===== 底部导航 ===== */
        .bottom-nav {
            flex-shrink: 0;
            background: #ffffff;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            border-top: 1px solid #ece0cf;
            padding-bottom: env(safe-area-inset-bottom, 10px);
        }
        .bottom-nav button {
            background: #d4a37308;
            border: 1px solid #e0d0bc;
            border-radius: 30px;
            padding: 5px 14px;
            font-size: 12px;
            cursor: pointer;
            color: #3d2b1a;
            transition: all 0.2s;
            font-weight: 500;
        }
        .bottom-nav button:hover {
            opacity: 0.8;
            transform: scale(0.96);
        }
        .bottom-nav .info {
            font-size: 13px;
            color: #d4a373;
            font-weight: 500;
            min-width: 55px;
            text-align: center;
        }

        /* ===== 滚动条 ===== */
        .content::-webkit-scrollbar {
            width: 6px;
        }
        .content::-webkit-scrollbar-track {
            background: #ece0cf;
            border-radius: 4px;
        }
        .content::-webkit-scrollbar-thumb {
            background: #d4a373;
            border-radius: 4px;
        }
        .content::-webkit-scrollbar-thumb:hover {
            background: #c17b4c;
        }

        /* ===== 暗色主题 ===== */
        body.dark {
            background: #0d0e12;
            color: #f0f2f8;
        }
        body.dark .header {
            background: #0d0e12;
            border-color: #20222c;
        }
        body.dark .header-left .title {
            color: #f0f2f8;
        }
        body.dark .header-left .book-btn {
            border-color: #2a2e3a;
            color: #f0f2f8;
            background: #aa886615;
        }
        body.dark .header-left .current-title {
            color: #8a93aa;
        }
        body.dark .header-right .btn-backup {
            border-color: #2a2e3a;
            color: #f0f2f8;
        }
        body.dark .header-right .btn-restore {
            border-color: #2a2e3a;
            color: #f0f2f8;
        }
        body.dark .header-right .btn-close {
            color: #f0f2f8;
        }
        body.dark .toolbar {
            background: #0d0e12;
            border-color: #20222c;
        }
        body.dark .toolbar .font-group {
            background: #aa886608;
        }
        body.dark .toolbar .font-group button {
            color: #f0f2f8;
        }
        body.dark .toolbar .font-group span {
            color: #f0f2f8;
        }
        body.dark .toolbar select {
            background: #1a1c24;
            border-color: #2a2e3a;
            color: #f0f2f8;
        }
        body.dark .toolbar .goto-group {
            background: #aa886608;
        }
        body.dark .toolbar .goto-group span {
            color: #8a93aa;
        }
        body.dark .toolbar .goto-group input {
            color: #f0f2f8;
        }
        body.dark .content {
            background: #0d0e12;
            color: #f0f2f8;
        }
        body.dark .content .chapter-wrap .chapter-title h1 {
            color: #aa8866;
            border-color: #aa8866;
        }
        body.dark .content .chapter-wrap .footer {
            border-color: #20222c;
        }
        body.dark .bottom-nav {
            background: #0d0e12;
            border-color: #20222c;
        }
        body.dark .bottom-nav button {
            border-color: #2a2e3a;
            color: #f0f2f8;
            background: #aa886608;
        }
        body.dark .bottom-nav .info {
            color: #aa8866;
        }
        body.dark .book-menu {
            background: #0d0e12;
            border-color: #20222c;
        }
        body.dark .book-menu .item {
            border-color: #20222c;
        }
        body.dark .book-menu .item .name {
            color: #f0f2f8;
        }
        body.dark .book-menu .item .count {
            color: #aa8866;
        }
        body.dark .book-menu .empty {
            color: #8a93aa;
        }
        body.dark .content::-webkit-scrollbar-track {
            background: #20222c;
        }
        body.dark .content::-webkit-scrollbar-thumb {
            background: #aa8866;
        }

        /* ===== 移动端适配 ===== */
        @media (max-width: 768px) {
            .header {
                padding: 6px 10px;
                gap: 4px;
            }
            .header-left {
                gap: 6px;
            }
            .header-left .logo {
                width: 28px;
                height: 28px;
                font-size: 15px;
            }
            .header-left .title {
                font-size: 13px;
            }
            .header-left .book-btn {
                padding: 4px 10px;
                font-size: 11px;
            }
            .header-left .current-title {
                font-size: 11px;
                max-width: 80px;
            }
            .header-right {
                gap: 4px;
            }
            .header-right button {
                padding: 4px 8px;
                font-size: 10px;
            }
            .header-right .btn-close {
                font-size: 16px;
                padding: 2px 6px;
            }
            .toolbar {
                gap: 8px;
                padding: 4px 10px;
            }
            .toolbar .font-group button {
                width: 24px;
                height: 24px;
                font-size: 12px;
            }
            .toolbar .font-group span {
                font-size: 11px;
                min-width: 26px;
            }
            .toolbar select {
                padding: 3px 8px;
                font-size: 10px;
            }
            .toolbar .goto-group {
                padding: 2px 8px;
            }
            .toolbar .goto-group input {
                width: 44px;
                font-size: 11px;
            }
            .toolbar .goto-group button {
                padding: 3px 8px;
                font-size: 9px;
            }
            .bottom-nav {
                padding: 8px 12px;
                gap: 14px;
            }
            .bottom-nav button {
                padding: 4px 10px;
                font-size: 11px;
            }
            .bottom-nav .info {
                font-size: 12px;
                min-width: 45px;
            }
            .content .chapter-wrap {
                padding: 1.2rem 0.8rem 2.5rem;
            }
            .content .chapter-wrap .chapter-title h1 {
                font-size: 1.2rem;
            }
            .book-menu {
                min-width: 170px;
                max-width: 220px;
            }
            .book-menu .item .name {
                max-width: 130px;
                font-size: 12px;
            }
        }
        @media (max-width: 480px) {
            .header-left .current-title {
                max-width: 60px;
                font-size: 10px;
            }
            .header-right button {
                padding: 3px 6px;
                font-size: 9px;
            }
            .header-right .btn-close {
                font-size: 14px;
                padding: 2px 4px;
            }
            .toolbar .goto-group input {
                width: 38px;
                font-size: 10px;
            }
            .bottom-nav button {
                padding: 4px 8px;
                font-size: 10px;
            }
            .bottom-nav .info {
                font-size: 11px;
                min-width: 38px;
            }
        }
    </style>
</head>
<body>

    <!-- 顶部栏 -->
    <div class="header">
        <div class="header-left">
            <div class="logo">📖</div>
            <span class="title">阅读器</span>
            <div class="book-wrap">
                <button class="book-btn" id="bookBtn">📚 书库</button>
                <div class="book-menu" id="bookMenu"></div>
            </div>
            <span class="current-title" id="currentTitle">未选择</span>
        </div>
        <div class="header-right">
            <button class="btn-import" id="importBtn">📂 导入</button>
            <button class="btn-backup" id="backupBtn">💾 备份</button>
            <button class="btn-restore" id="restoreBtn">📁 恢复</button>
            <button class="btn-del" id="delBtn">🗑️</button>
            <button class="btn-close" id="closeBtn">✕</button>
        </div>
    </div>

    <!-- 工具栏 -->
    <div class="toolbar">
        <div class="font-group">
            <button id="fontDown">A−</button>
            <span id="fontSizeVal">18</span>
            <button id="fontUp">A+</button>
        </div>
        <select id="themeSelect">
            <option value="paper">📄 纸笺</option>
            <option value="midnight">✨ 子夜</option>
        </select>
        <div class="goto-group">
            <span>📖 跳转</span>
            <input type="number" id="gotoInput" min="1" placeholder="章节">
            <button id="gotoBtn">GO</button>
        </div>
    </div>

    <!-- 阅读区 -->
    <div class="content" id="content">
        <div class="placeholder">
            <div class="icon">📖</div>
            <div class="name">阅读器</div>
            <div class="sub">点击「导入」添加小说文件</div>
        </div>
    </div>

    <!-- 底部导航 -->
    <div class="bottom-nav">
        <button id="prevBtn">◀ 上一章</button>
        <span class="info" id="chapterInfo">-/-</span>
        <button id="nextBtn">下一章 ▶</button>
    </div>

    <!-- 隐藏的文件输入 -->
    <input type="file" id="fileInput" accept=".txt" style="display:none">
    <input type="file" id="restoreFileInput" accept=".json" style="display:none">

    <script>
        // ============================================================
        // 阅读器 - IndexedDB 版
        // 数据存储在 IndexedDB，更可靠
        // ============================================================

        // ---------- 状态 ----------
        let novels = [];
        let currentNovelId = null;
        let currentChapters = [];
        let currentChapterIdx = 0;
        let currentContent = '';
        let currentName = '';
        let fontSize = 18;
        let themeMode = 'paper';
        let scrollTimeout = null;
        let db = null;
        let dbReady = false;

        // DOM 引用
        const contentEl = document.getElementById('content');
        const bookMenu = document.getElementById('bookMenu');
        const currentTitleEl = document.getElementById('currentTitle');
        const chapterInfoEl = document.getElementById('chapterInfo');
        const fontSizeValEl = document.getElementById('fontSizeVal');
        const themeSelect = document.getElementById('themeSelect');
        const gotoInput = document.getElementById('gotoInput');

        // ---------- 工具函数 ----------
        function esc(s) {
            if (!s) return '';
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // ========== IndexedDB 初始化 ==========
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('ReaderDB', 1);
                request.onerror = function() { reject(request.error); };
                request.onsuccess = function() {
                    db = request.result;
                    dbReady = true;
                    resolve();
                };
                request.onupgradeneeded = function(e) {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('data')) {
                        const store = db.createObjectStore('data', { keyPath: 'key' });
                        console.log('[DB] 创建 data 表');
                    }
                };
            });
        }

        // ---------- 保存数据到 IndexedDB ----------
        function saveDataToDB(data) {
            return new Promise((resolve, reject) => {
                if (!dbReady) { reject(new Error('数据库未就绪')); return; }
                const tx = db.transaction(['data'], 'readwrite');
                const store = tx.objectStore('data');
                const req = store.put({ key: 'reader_data', value: data });
                req.onsuccess = function() { resolve(); };
                req.onerror = function() { reject(req.error); };
            });
        }

        // ---------- 从 IndexedDB 加载数据 ----------
        function loadDataFromDB() {
            return new Promise((resolve, reject) => {
                if (!dbReady) { reject(new Error('数据库未就绪')); return; }
                const tx = db.transaction(['data'], 'readonly');
                const store = tx.objectStore('data');
                const req = store.get('reader_data');
                req.onsuccess = function() { resolve(req.result ? req.result.value : null); };
                req.onerror = function() { reject(req.error); };
            });
        }

        // ---------- 数据持久化 ----------
        async function saveData() {
            try {
                if (currentNovelId) {
                    const idx = novels.findIndex(n => n.id === currentNovelId);
                    if (idx !== -1) {
                        novels[idx].chapters = currentChapters;
                        novels[idx].lastChapter = currentChapterIdx;
                        novels[idx].lastPos = contentEl.scrollTop || 0;
                    }
                }
                const data = {
                    novels: novels,
                    currentNovelId: currentNovelId,
                    fontSize: fontSize,
                    themeMode: themeMode
                };
                await saveDataToDB(data);
                console.log('[保存] 成功，书籍数:', novels.length);
            } catch (e) {
                console.error('[保存] 失败:', e);
            }
        }

        async function loadData() {
            try {
                const data = await loadDataFromDB();
                if (!data) return;
                novels = data.novels || [];
                currentNovelId = data.currentNovelId || null;
                fontSize = data.fontSize || 18;
                themeMode = data.themeMode || 'paper';

                if (currentNovelId) {
                    const cur = novels.find(n => n.id === currentNovelId);
                    if (cur) {
                        currentContent = cur.content;
                        currentName = cur.name;
                        currentChapters = cur.chapters || [];
                        currentChapterIdx = cur.lastChapter || 0;
                    }
                }
                console.log('[加载] 成功，书籍数:', novels.length);
            } catch (e) {
                console.error('[加载] 失败:', e);
            }
        }

        // ---------- 主题 ----------
        function applyTheme() {
            document.body.className = themeMode === 'midnight' ? 'dark' : '';
            themeSelect.value = themeMode;
            contentEl.style.fontSize = fontSize + 'px';
            fontSizeValEl.textContent = fontSize;
        }

        // ---------- 分章 ----------
        function parseChapters(content) {
            const chapters = [];
            let match;
            const pattern = /^第[零一二三四五六七八九十百千万0-9]+章/gm;
            pattern.lastIndex = 0;
            while ((match = pattern.exec(content)) !== null) {
                const title = match[0].trim();
                if (title.length >= 3) {
                    if (chapters.length > 0) {
                        chapters[chapters.length - 1].endIdx = match.index;
                    }
                    chapters.push({
                        title: title,
                        startIdx: match.index,
                        endIdx: content.length
                    });
                }
            }
            if (chapters.length === 0) {
                chapters.push({ title: '正文', startIdx: 0, endIdx: content.length });
            }
            return chapters;
        }

        // ---------- 渲染 ----------
        function renderChapter() {
            if (!contentEl) return;

            if (!currentContent || currentChapters.length === 0) {
                contentEl.innerHTML = `
                    <div class="placeholder">
                        <div class="icon">📖</div>
                        <div class="name">阅读器</div>
                        <div class="sub">点击「导入」添加小说文件</div>
                    </div>
                `;
                chapterInfoEl.textContent = '-/-';
                currentTitleEl.textContent = '未选择';
                return;
            }

            const chapter = currentChapters[currentChapterIdx];
            if (!chapter) return;

            let content = currentContent.substring(chapter.startIdx, chapter.endIdx);
            const firstLineEnd = content.indexOf('\n');
            if (firstLineEnd > 0 && content.substring(0, firstLineEnd).trim().startsWith(chapter.title)) {
                content = content.substring(firstLineEnd + 1);
            }

            const paragraphs = content.split(/\n\n+/);
            const accent = themeMode === 'midnight' ? '#aa8866' : '#d4a373';

            let html = '<div class="chapter-wrap">';
            html += `<div class="chapter-title"><h1>${esc(chapter.title)}</h1></div>`;
            for (const p of paragraphs) {
                const trimmed = p.trim();
                if (trimmed) {
                    html += `<p>${trimmed.replace(/\n/g, '<br>')}</p>`;
                }
            }
            html += `<div class="footer"><span style="color:${accent}">✦</span> 第 ${currentChapterIdx+1} 章 · 共 ${currentChapters.length} 章 <span style="color:${accent}">✦</span></div>`;
            html += '</div>';
            contentEl.innerHTML = html;

            chapterInfoEl.textContent = `${currentChapterIdx+1}/${currentChapters.length}`;
            currentTitleEl.textContent = currentName || '未选择';
        }

        // ---------- 章节切换 ----------
        function prevChapter() {
            if (!currentChapters.length) return;
            if (currentChapterIdx > 0) {
                currentChapterIdx--;
            } else {
                currentChapterIdx = currentChapters.length - 1;
            }
            renderChapter();
            contentEl.scrollTop = 0;
            saveData();
        }

        function nextChapter() {
            if (!currentChapters.length) return;
            if (currentChapterIdx < currentChapters.length - 1) {
                currentChapterIdx++;
            } else {
                currentChapterIdx = 0;
            }
            renderChapter();
            contentEl.scrollTop = 0;
            saveData();
        }

        function gotoChapter() {
            if (!currentChapters.length) {
                alert('没有可跳转的章节');
                return;
            }
            const num = parseInt(gotoInput.value);
            if (isNaN(num) || num < 1 || num > currentChapters.length) {
                alert(`请输入 1-${currentChapters.length} 之间的数字`);
                return;
            }
            currentChapterIdx = num - 1;
            renderChapter();
            contentEl.scrollTop = 0;
            saveData();
            gotoInput.value = '';
        }

        // ---------- 书库菜单 ----------
        function buildBookMenu() {
            if (novels.length === 0) {
                bookMenu.innerHTML = '<div class="empty">📭 暂无书籍</div>';
                return;
            }

            let html = '';
            for (const n of novels) {
                const active = currentNovelId === n.id;
                const bg = active ? (themeMode === 'midnight' ? '#aa886620' : '#d4a37320') : 'transparent';
                const borderLeft = active ? `3px solid ${themeMode === 'midnight' ? '#aa8866' : '#d4a373'}` : 'none';
                html += `
                    <div class="item" data-id="${n.id}" style="background:${bg};border-left:${borderLeft}">
                        <span class="name" title="${esc(n.name)}">${esc(n.name)}</span>
                        <span class="count">${n.chapters?.length || 0}章</span>
                    </div>
                `;
            }
            bookMenu.innerHTML = html;

            bookMenu.querySelectorAll('.item').forEach(el => {
                el.addEventListener('click', (e) => {
                    const id = el.dataset.id;
                    if (id) switchNovel(id);
                    toggleBookMenu(false);
                });
            });
        }

        function toggleBookMenu(show) {
            if (show === undefined) {
                bookMenu.classList.toggle('show');
            } else {
                bookMenu.classList.toggle('show', show);
            }
        }

        // ---------- 切换小说 ----------
        function switchNovel(id) {
            const novel = novels.find(n => n.id === id);
            if (!novel) return;

            if (currentNovelId && contentEl) {
                const idx = novels.findIndex(n => n.id === currentNovelId);
                if (idx !== -1) {
                    novels[idx].lastPos = contentEl.scrollTop || 0;
                    novels[idx].lastChapter = currentChapterIdx;
                }
            }

            currentNovelId = id;
            currentContent = novel.content;
            currentName = novel.name;
            currentChapters = novel.chapters || [];
            currentChapterIdx = novel.lastChapter || 0;

            if (currentChapters.length === 0 && currentContent) {
                currentChapters = parseChapters(currentContent);
                novel.chapters = currentChapters;
            }

            renderChapter();
            buildBookMenu();

            if (novel.lastPos) {
                setTimeout(() => { contentEl.scrollTop = novel.lastPos; }, 100);
            }

            saveData();
            toggleBookMenu(false);
        }

        // ---------- 删除当前书籍 ----------
        function deleteCurrentBook() {
            if (!currentNovelId) return;
            const novel = novels.find(n => n.id === currentNovelId);
            if (!confirm(`删除《${novel.name}》？`)) return;
            novels = novels.filter(n => n.id !== currentNovelId);
            if (novels.length > 0) {
                switchNovel(novels[0].id);
            } else {
                currentNovelId = null;
                currentContent = '';
                currentName = '';
                currentChapters = [];
                currentChapterIdx = 0;
                renderChapter();
                buildBookMenu();
                saveData();
            }
        }

        // ---------- 导入小说 ----------
        function importNovel() {
            document.getElementById('fileInput').click();
        }

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = this.files[0];
            if (!file) return;
            const fr = new FileReader();
            fr.onload = function(ev) {
                try {
                    let name = file.name.replace(/\.txt$/i, '');
                    let content = ev.target.result;
                    if (content.charCodeAt(0) === 0xFEFF) content = content.slice(1);
                    content = content.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

                    const chapters = parseChapters(content);
                    const id = Date.now() + '_' + Math.random().toString(36).substr(2, 6);
                    novels.push({
                        id: id,
                        name: name,
                        content: content,
                        chapters: chapters,
                        lastChapter: 0,
                        lastPos: 0
                    });

                    saveData();
                    buildBookMenu();
                    switchNovel(id);
                    alert(`✨ 「${name}」已导入，共 ${chapters.length} 章`);
                } catch (err) {
                    alert('导入失败: ' + err.message);
                }
            };
            fr.readAsText(file, 'UTF-8');
            this.value = '';
        });

        // ---------- 导出备份 ----------
        function exportBackup() {
            try {
                const backupData = {
                    version: 1,
                    exportTime: new Date().toISOString(),
                    novels: novels.map(n => ({
                        id: n.id,
                        name: n.name,
                        content: n.content,
                        chapters: n.chapters,
                        lastChapter: n.lastChapter,
                        lastPos: n.lastPos
                    })),
                    settings: {
                        fontSize: fontSize,
                        themeMode: themeMode
                    }
                };
                const blob = new Blob([JSON.stringify(backupData, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `reader_backup_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
                a.click();
                setTimeout(() => URL.revokeObjectURL(url), 100);
                alert(`已导出 ${novels.length} 本书籍`);
            } catch (e) {
                alert('导出失败: ' + e.message);
            }
        }

        // ---------- 导入备份 ----------
        function importBackup() {
            document.getElementById('restoreFileInput').click();
        }

        document.getElementById('restoreFileInput').addEventListener('change', function(e) {
            const file = this.files[0];
            if (!file) return;
            const fr = new FileReader();
            fr.onload = function(ev) {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (!data.novels) throw new Error('格式错误');

                    novels = data.novels.map(n => ({
                        id: n.id,
                        name: n.name,
                        content: n.content,
                        chapters: n.chapters || [],
                        lastChapter: n.lastChapter || 0,
                        lastPos: n.lastPos || 0
                    }));

                    if (data.settings) {
                        if (data.settings.fontSize) fontSize = data.settings.fontSize;
                        if (data.settings.themeMode) themeMode = data.settings.themeMode;
                    }

                    saveData();
                    applyTheme();
                    if (novels.length > 0) {
                        switchNovel(novels[0].id);
                    } else {
                        renderChapter();
                        buildBookMenu();
                    }
                    alert(`已导入 ${novels.length} 本书籍`);
                } catch (err) {
                    alert('导入失败: ' + err.message);
                }
            };
            fr.readAsText(file, 'UTF-8');
            this.value = '';
        });

        // ---------- 字号 ----------
        function changeFontSize(delta) {
            fontSize = Math.min(26, Math.max(14, fontSize + delta));
            contentEl.style.fontSize = fontSize + 'px';
            fontSizeValEl.textContent = fontSize;
            saveData();
        }

        // ---------- 关闭 ----------
        function closeReader() {
            saveData();
            document.body.style.display = 'none';
        }

        // ---------- 事件绑定 ----------
        document.getElementById('bookBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            toggleBookMenu();
        });

        document.addEventListener('click', () => {
            toggleBookMenu(false);
        });

        document.getElementById('importBtn').addEventListener('click', importNovel);
        document.getElementById('backupBtn').addEventListener('click', exportBackup);
        document.getElementById('restoreBtn').addEventListener('click', importBackup);
        document.getElementById('delBtn').addEventListener('click', deleteCurrentBook);
        document.getElementById('closeBtn').addEventListener('click', closeReader);

        document.getElementById('prevBtn').addEventListener('click', prevChapter);
        document.getElementById('nextBtn').addEventListener('click', nextChapter);
        document.getElementById('gotoBtn').addEventListener('click', gotoChapter);
        document.getElementById('gotoInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') gotoChapter();
        });

        document.getElementById('fontUp').addEventListener('click', () => changeFontSize(1));
        document.getElementById('fontDown').addEventListener('click', () => changeFontSize(-1));

        themeSelect.addEventListener('change', function() {
            themeMode = this.value;
            applyTheme();
            renderChapter();
            saveData();
        });

        // 滚动保存
        contentEl.addEventListener('scroll', function() {
            if (scrollTimeout) clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => {
                if (currentNovelId) {
                    const idx = novels.findIndex(n => n.id === currentNovelId);
                    if (idx !== -1) {
                        novels[idx].lastPos = contentEl.scrollTop || 0;
                        saveData();
                    }
                }
            }, 500);
        });

        // ---------- 键盘快捷键 ----------
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;

            if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
                e.preventDefault();
                prevChapter();
            } else if (e.key === 'ArrowRight' || e.key === 'PageDown') {
                e.preventDefault();
                nextChapter();
            } else if (e.key === 'Escape') {
                closeReader();
            }
        });

        // ============================================================
        // 手机端：加载后滚动隐藏地址栏
        // ============================================================

        window.addEventListener('load', () => {
            setTimeout(() => window.scrollTo(0, 1), 200);
        });

        // ---------- 启动 ----------
        async function start() {
            try {
                await initDB();
                await loadData();
                applyTheme();
                buildBookMenu();
                renderChapter();

                if (currentNovelId) {
                    const novel = novels.find(n => n.id === currentNovelId);
                    if (novel && novel.lastPos) {
                        setTimeout(() => {
                            contentEl.scrollTop = novel.lastPos;
                        }, 150);
                    }
                }

                console.log('[阅读器] 已启动 (IndexedDB版)');
                console.log('[快捷键] ← 上一章 | → 下一章 | ESC 关闭');
            } catch (e) {
                console.error('[启动] 失败:', e);
                // 降级尝试：如果 IndexedDB 失败，尝试从 localStorage 恢复
                try {
                    const raw = localStorage.getItem('reader_data');
                    if (raw) {
                        const data = JSON.parse(raw);
                        novels = data.novels || [];
                        currentNovelId = data.currentNovelId || null;
                        fontSize = data.fontSize || 18;
                        themeMode = data.themeMode || 'paper';
                        if (currentNovelId) {
                            const cur = novels.find(n => n.id === currentNovelId);
                            if (cur) {
                                currentContent = cur.content;
                                currentName = cur.name;
                                currentChapters = cur.chapters || [];
                                currentChapterIdx = cur.lastChapter || 0;
                            }
                        }
                        applyTheme();
                        buildBookMenu();
                        renderChapter();
                        console.log('[降级] 从 localStorage 恢复成功');
                    }
                } catch(e2) {}
            }
        }

        start();
    </script>

</body>
